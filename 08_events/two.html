<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Working on Async and Sync</h1>
    <button id="stop">Stop</button>
</body>
<script>
    // setTimeout(function(){
    //     console.log("Dhiraj");
    // }, 2000)

    const sayMyName = function(){
        console.log("Dhiraj");
    }

    const changeText = function(){
         document.querySelector('h1').innerHTML = "Working on Async and Sync with Dhiraj"
    }

    // setTimeout(sayMyName, 2000)
    // setTimeout(changeText, 2000)

    const changeMe = setTimeout(changeText, 2000)

    document.querySelector('#stop').addEventListener('click', function(){
        clearTimeout(changeMe)
    })

    // clearTimeout() can be used to stop the setTimeout function from executing


</script>
</html>
